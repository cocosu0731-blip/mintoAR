<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>幽咲ミント</title>

<style>
body{
  background: linear-gradient(#ffd6ec,#ffeef7);
  text-align:center;
  font-family:sans-serif;
  margin:0;
  padding:20px;
}

h1{
  color:#8a2be2;
  font-size:40px;
}

p{
  font-size:20px;
}

img{
  width:300px;
  max-width:80%;
  animation: float 2s ease-in-out infinite;
}

button{
  background:#8a2be2;
  color:white;
  border:none;
  border-radius:20px;
  padding:15px 25px;
  font-size:18px;
  cursor:pointer;
}

button:hover{
  transform:scale(1.05);
}

a{
  color:#8a2be2;
  font-size:20px;
  text-decoration:none;
}

@keyframes float{
  0%{
    transform:translateY(0px);
  }

  50%{
    transform:translateY(-10px);
  }

  100%{
    transform:translateY(0px);
  }
}
</style>

</head>

<body>

<h1>👻 幽咲ミント 👻</h1>

<img src="minto.png">

<p>
ホラー大好き元気っ子高校生VTuber！
</p>

<button onclick="playVoice()">
自己紹介を聞く
</button>

<p>
<a href="https://x.com/" target="_blank">
Xはこちら
</a>
</p>

<audio id="voice">
<source src="Voice.m4a" type="audio/mp4">
</audio>

<script>
function playVoice(){
 document.getElementById("voice").play();
}
</script>

</body>
</html>
